<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>WASM Snake</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
      background: #1e293b;
      padding: 20px 30px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    h1 {
      margin-bottom: 10px;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }

    .score {
      font-size: 18px;
    }

    button {
      background: #22c55e;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #16a34a;
    }

    canvas {
      background: #020617;
      border-radius: 8px;
    }

    .hint {
      margin-top: 10px;
      font-size: 12px;
      color: #94a3b8;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>🐍 WASM Snake</h1>

    <div class="top-bar">
      <div class="score">Score: <span id="score">0</span></div>
      <button onclick="restart()">Restart</button>
    </div>

    <canvas id="game" width="400" height="400"></canvas>

    <div class="hint">Use arrow keys ↑ ↓ ← →</div>
  </div>

  <script type="module">
    import init, { Game, Direction } from "./pkg/wasm_demo.js";

    async function main() {
      await init();

      const canvas = document.getElementById("game");
      const ctx = canvas.getContext("2d");

      const gridSize = 20;
      let game = new Game(20, 20);

      window.restart = function () {
        game.reset();
      };

      window.addEventListener("keydown", (e) => {
        if (e.key === "ArrowUp") game.set_direction(Direction.Up);
        if (e.key === "ArrowDown") game.set_direction(Direction.Down);
        if (e.key === "ArrowLeft") game.set_direction(Direction.Left);
        if (e.key === "ArrowRight") game.set_direction(Direction.Right);
      });

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Snake
        for (let i = 0; i < game.snake_length(); i++) {
          ctx.fillStyle = i === 0 ? "#22c55e" : "#4ade80";
          ctx.fillRect(
            game.snake_x(i) * gridSize,
            game.snake_y(i) * gridSize,
            gridSize,
            gridSize
          );
        }

        // Food
        ctx.fillStyle = "#ef4444";
        ctx.fillRect(
          game.food_x() * gridSize,
          game.food_y() * gridSize,
          gridSize,
          gridSize
        );

        // Score
        document.getElementById("score").innerText = game.score();

        // Game Over overlay
        if (game.is_game_over()) {
          ctx.fillStyle = "rgba(0,0,0,0.6)";
          ctx.fillRect(0, 0, canvas.width, canvas.height);

          ctx.fillStyle = "white";
          ctx.font = "28px Arial";
          ctx.textAlign = "center";
          ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2);

          ctx.font = "16px Arial";
          ctx.fillText("Press Restart", canvas.width / 2, canvas.height / 2 + 30);
        }
      }

      function loop() {
        game.update();
        draw();
      }

      setInterval(loop, 120);
    }

    main();
  </script>
</body>
</html>
