<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>WASM Arcade</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="home-page" class="container">

    <h1>🎮 WASM Arcade</h1>
    <p>Select a game</p>

    <div class="games">

        <div class="card" id="snake-card">
            <h2>🐍 Snake</h2>
            <p>Play Snake</p>
        </div>

        <div class="card disabled">
            <h2>🏓 Pong</h2>
            <p>Coming Soon</p>
        </div>

        <div class="card disabled">
            <h2>🐦 Flappy Bird</h2>
            <p>Coming Soon</p>
        </div>

        <div class="card" id="space-card">
            <h2>🚀 Space Shooter</h2>
            <p>Play Space Shooter</p>
        </div>
    </div>

</div>

<div id="game-page" class="container hidden">

    <button id="back-btn">← Back</button>

    <h1 id="game-title">Snake</h1>

    <div class="top-bar">
        <div class="score">
            Score:
            <span id="score">0</span>
        </div>

        <div class="best-score">
            Best:
            <span id="best-score">0</span>
        </div>

        <button id="restart-btn">
            Restart
        </button>
    </div>

    <canvas id="game" width="400" height="400"></canvas>

    <div id="hint" class="hint">
        Use arrow keys ↑ ↓ ← →
    </div>

</div>

<script type="module" src="js/main.js"></script>

</body>
</html>
