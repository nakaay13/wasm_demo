<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WASM Arcade</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="home-page" class="container">

    <h1>🎮 WASM Arcade</h1>
    <p>Select a game</p>

    <div class="games">

        <button class="card" id="snake-card" type="button">
            <h2>🐍 Snake</h2>
            <p>Play Snake</p>
        </button>

        <button class="card" id="pong-card" type="button">
            <h2>🏓 Pong</h2>
            <p>Play Pong</p>
        </button>

        <button class="card" id="flappy-card" type="button">
            <h2>🐦 Flappy Bird</h2>
            <p>Play Flappy Bird</p>
        </button>
    </div>

</div>

<div id="game-page" class="container hidden">

    <button id="back-btn" type="button">← Back</button>

    <h1 id="game-title">Snake</h1>

    <div class="top-bar">
        <div class="score">
            Score:
            <span id="score">0</span>
        </div>

        <div class="best-score">
            Best:
            <span id="best-score">0</span>
        </div>

        <button id="restart-btn" type="button">
            Restart (R)
        </button>
    </div>

    <canvas id="game" width="400" height="400"></canvas>

    <div id="hint" class="hint">
        Use arrow keys ↑ ↓ ← →
    </div>

</div>

<script type="module" src="js/main.js"></script>

</body>
</html>
